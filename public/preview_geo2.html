<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ccc; padding: 20px; display: flex; gap: 20px; }
  .box { width: 300px; height: 300px; background: white; border: 1px solid #999; }
  img, svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="box">
<b>Target</b>
<img src="/Untitled%20design.svg" />
</div>
<div class="box">
<b>My New Geo 2</b>
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="logo-mask">
      <rect width="100" height="100" fill="white" />
      <g transform="rotate(45, 50, 50)">
        <!-- The C shape -->
        <path d="M 34 50 A 20 20 0 1 0 66 50" fill="none" stroke="black" stroke-width="14" stroke-linecap="round" />
        <!-- The slit -->
        <line x1="50" y1="10" x2="50" y2="40" stroke="black" stroke-width="2.5" />
        <!-- The bulb -->
        <circle cx="50" cy="40" r="4.5" fill="black" />
      </g>
    </mask>
  </defs>
  <!-- Outer geometry: curved teardrop -->
  <g transform="rotate(45, 50, 50)">
    <path d="M 48 10 A 2 2 0 0 1 52 10 C 52 10, 85 40, 85 64 A 35 35 0 1 1 15 64 C 15 40, 48 10, 48 10 Z" 
          fill="#38526B" mask="url(#logo-mask)" />
  </g>
</svg>
</div>

</body>
</html>
