<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ccc; padding: 20px; display: flex; gap: 20px; }
  .box { width: 300px; height: 300px; background: white; border: 1px solid #999; }
  img, svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="box">
<b>Target</b>
<img src="/Untitled%20design.svg" />
</div>
<div class="box">
<b>My New Geo</b>
<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <mask id="logo-mask">
      <rect width="100" height="100" fill="white" />
      <circle cx="45" cy="55" r="25" fill="black" />
      <!-- The slit -->
      <line x1="96" y1="4" x2="40" y2="60" stroke="black" stroke-width="6" stroke-linecap="round"/>
    </mask>
  </defs>
  <!-- Outer geometry: curved teardrop -->
  <path d="M 96 4 
           Q 75 10 39.3 15.6 
           A 40 40 0 1 0 84.4 60.7 
           Q 90 25 96 4 Z" 
        fill="#38526B" mask="url(#logo-mask)" />
</svg>
</div>

</body>
</html>
